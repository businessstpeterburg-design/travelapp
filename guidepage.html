<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#030303" />
  <title>Как Местный — Guide Pass</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #030303;
      --deep: #020407;
      --white: #FFFFFF;
      --soft: rgba(255,255,255,.70);
      --goldLight: #F2D18A;
      --gold: #D5A84A;
      --goldDark: #8E5C14;
      --screen: 430px;
      --side: clamp(22px, 6vw, 34px);
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      display: flex;
      justify-content: center;
      background: linear-gradient(180deg, var(--deep), var(--black));
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: var(--screen);
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background: var(--black);
      animation: pageIn .6s ease-out both;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      left: 50%;
      width: 100%;
      max-width: var(--screen);
      transform: translateX(-50%);
      background-image:
        linear-gradient(
          180deg,
          rgba(2,4,7,.05) 0%,
          rgba(2,4,7,.12) 32%,
          rgba(3,3,3,.60) 58%,
          rgba(3,3,3,.96) 100%
        ),
        linear-gradient(
          90deg,
          rgba(2,4,7,.56) 0%,
          rgba(2,4,7,.28) 42%,
          rgba(2,4,7,.08) 100%
        ),
        url("guide-bg.png");
      background-size: cover, cover, cover;
      background-position: center top, center top, center -44px;
      background-repeat: no-repeat;
      z-index: -4;
      pointer-events: none;
      animation: bgIn .6s ease-out both;
    }

    .page::after {
      content: "";
      position: fixed;
      inset: 0;
      left: 50%;
      width: 100%;
      max-width: var(--screen);
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 84% 28%, rgba(242,209,138,.09), rgba(3,3,3,0) 26%),
        linear-gradient(
          180deg,
          rgba(3,3,3,0) 0%,
          rgba(3,3,3,.20) 44%,
          rgba(3,3,3,.89) 88%,
          #030303 100%
        );
      z-index: -3;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      padding: calc(70px + var(--safeTop)) var(--side) calc(34px + var(--safeBottom));
      display: flex;
      flex-direction: column;
    }

    .hero {
      width: min(302px, 78vw);
      animation: rise .6s cubic-bezier(.2,.8,.2,1) .16s both;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--goldLight);
      font-size: 13px;
      letter-spacing: .105em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .identity {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 18px;
    }

    .avatar {
      position: relative;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 999px;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.025)),
        linear-gradient(135deg, var(--goldLight), var(--goldDark));
      border: 1px solid rgba(242,209,138,.50);
      box-shadow:
        inset 0 0 1px rgba(255,255,255,.55),
        inset 0 0 14px rgba(255,255,255,.04),
        0 10px 24px rgba(0,0,0,.28),
        0 0 18px rgba(213,168,74,.10);
    }

    .avatar::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,.42), rgba(255,255,255,0) 34%),
        linear-gradient(145deg, rgba(3,3,3,.05), rgba(3,3,3,.22));
      pointer-events: none;
    }

    .avatar::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      transform: translate(-50%, -70%);
      background: rgba(3,3,3,.42);
      box-shadow: 0 15px 0 9px rgba(3,3,3,.34);
      opacity: .46;
    }

    .avatar img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      opacity: 0;
      transition: opacity .3s ease-out;
    }

    .avatar.hasPhoto img {
      opacity: 1;
    }

    .avatar.hasPhoto::after {
      display: none;
    }

    .name {
      margin: 0;
      color: var(--white);
      font-size: clamp(33px, 10vw, 45px);
      line-height: 1.04;
      letter-spacing: -.03em;
      font-weight: 300;
    }

    .rule {
      width: 25px;
      height: 1px;
      margin: 5px 0 40px;
      background: linear-gradient(90deg, var(--goldLight), var(--goldDark));
      box-shadow: 0 0 18px rgba(242,209,138,.28);
    }

    .title {
      margin: 0;
      max-width: 315px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(44px, 13vw, 62px);
      line-height: .94;
      letter-spacing: -.03em;
      font-weight: 300;
      text-transform: uppercase;
    }

    .title span {
      display: block;
    }

    .title .gold {
      color: var(--goldLight);
      text-shadow: 0 0 24px rgba(213,168,74,.18);
    }

    .description {
      margin: 27px 0 0;
      max-width: 295px;
      color: rgba(255,255,255,.78);
      font-size: 16px;
      line-height: 1.62;
      letter-spacing: -.012em;
      font-weight: 300;
    }

    .spacer {
      flex: 1 1 auto;
      min-height: clamp(82px, 16svh, 150px);
    }

    .stack {
      display: grid;
      gap: 16px;
      animation: rise .6s cubic-bezier(.2,.8,.2,1) .28s both;
    }

    .glass {
      position: relative;
      overflow: hidden;
      border-radius: 21px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.155), rgba(255,255,255,.018) 38%, rgba(255,255,255,.055)),
        linear-gradient(180deg, rgba(3,3,3,.012), rgba(3,3,3,.092));
      border: 1px solid rgba(242,209,138,.46);
      box-shadow:
        inset 0 0 1px rgba(255,255,255,.50),
        inset 0 0 22px rgba(255,255,255,.033),
        inset 0 1px 0 rgba(255,255,255,.62),
        inset 0 13px 30px rgba(255,255,255,.045),
        inset 0 -13px 30px rgba(0,0,0,.075),
        inset 0 -1px 0 rgba(142,92,20,.28),
        0 18px 46px rgba(0,0,0,.42),
        0 0 30px rgba(213,168,74,.10);
      backdrop-filter: blur(3px) saturate(110%) brightness(105%);
      -webkit-backdrop-filter: blur(3px) saturate(110%) brightness(105%);
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(105deg, rgba(255,255,255,.44) 0%, rgba(255,255,255,.105) 19%, rgba(255,255,255,0) 43%),
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.20), rgba(255,255,255,0) 25%),
        radial-gradient(circle at 92% 0%, rgba(242,209,138,.27), rgba(242,209,138,0) 31%),
        radial-gradient(circle at 50% 100%, rgba(242,209,138,.13), rgba(242,209,138,0) 36%);
      opacity: .84;
    }

    .glass::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,.20);
      box-shadow:
        inset 12px 0 34px rgba(255,255,255,.038),
        inset -12px 0 30px rgba(242,209,138,.045);
    }

    .shine {
      position: absolute;
      inset: -40%;
      z-index: 1;
      background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,.082) 48%, rgba(242,209,138,.052) 52%, transparent 65%);
      transform: translateX(-55%) rotate(8deg);
      animation: luxuryShine 22s ease-in-out infinite;
      pointer-events: none;
    }

    .caustic {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 42% 20% at 18% 26%, rgba(255,255,255,.038), transparent 68%),
        radial-gradient(ellipse 34% 18% at 82% 72%, rgba(242,209,138,.028), transparent 70%),
        linear-gradient(128deg, transparent 0%, rgba(255,255,255,.019) 44%, transparent 62%);
      mix-blend-mode: screen;
      opacity: .56;
      animation: causticDrift 24s ease-in-out infinite;
    }

    .timer {
      padding: 21px 18px 19px;
      min-height: 126px;
    }

    .timerLabel {
      position: relative;
      z-index: 2;
      margin: 0 0 14px;
      text-align: center;
      color: var(--goldLight);
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: .125em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .timerGrid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1px 1fr 1px 1fr 1px 1fr;
      align-items: center;
      column-gap: 13px;
    }

    .timerItem {
      text-align: center;
      min-width: 0;
    }

    .num {
      display: block;
      color: rgba(255,255,255,.97);
      font-size: clamp(40px, 12vw, 56px);
      line-height: .96;
      letter-spacing: -.04em;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 1px 0 rgba(255,255,255,.30),
        0 -1px 0 rgba(255,255,255,.11),
        0 0 9px rgba(255,255,255,.09),
        0 0 24px rgba(255,255,255,.10);
    }

    .num.tick {
      animation: numberTick .16s ease-out both;
    }

    .unit {
      display: block;
      margin-top: 12px;
      color: var(--goldLight);
      font-size: 11px;
      line-height: 1;
      letter-spacing: .052em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .separator {
      width: 1px;
      height: 54px;
      background: linear-gradient(180deg, rgba(242,209,138,0), rgba(242,209,138,.62), rgba(142,92,20,.18), rgba(242,209,138,0));
      box-shadow: 0 0 10px rgba(213,168,74,.18);
    }

    .status {
      padding: 19px 22px;
    }

    .statusList {
      position: relative;
      z-index: 2;
      display: grid;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 18px;
      align-items: center;
      min-height: 48px;
      border-bottom: 1px solid rgba(255,255,255,.082);
    }

    .row:last-child {
      border-bottom: 0;
    }

    .key {
      color: rgba(255,255,255,.82);
      font-size: 15px;
      line-height: 1.25;
      font-weight: 300;
      letter-spacing: -.008em;
    }

    .value {
      color: rgba(255,255,255,.93);
      font-size: 14px;
      line-height: 1.25;
      text-align: right;
      font-weight: 400;
      letter-spacing: -.008em;
      white-space: nowrap;
      min-width: 112px;
    }

    .goldText {
      color: var(--goldLight);
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-left: 6px;
      border-radius: 999px;
      vertical-align: 1px;
      background: var(--gold);
      box-shadow: 0 0 10px rgba(213,168,74,.65);
    }

    .actions {
      display: grid;
      gap: 17px;
      margin-top: 22px;
      animation: rise .6s cubic-bezier(.2,.8,.2,1) .4s both;
    }

    .btn {
      position: relative;
      width: 100%;
      min-height: 60px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      font-size: 17px;
      line-height: 1;
      letter-spacing: .118em;
      font-weight: 500;
      transition: transform .22s cubic-bezier(.2,.8,.2,1), filter .22s, box-shadow .22s, border-color .22s;
      overflow: hidden;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    .btn:active {
      transform: scale(.985);
    }

    .btn:focus-visible {
      outline: 1px solid rgba(242,209,138,.88);
      outline-offset: 4px;
      box-shadow:
        0 0 0 5px rgba(213,168,74,.12),
        0 0 24px rgba(213,168,74,.16);
    }

    .primary {
      color: #030303;
      background:
        linear-gradient(180deg, rgba(255,255,255,.32), rgba(255,255,255,0) 34%),
        linear-gradient(135deg, var(--goldLight) 0%, var(--gold) 52%, var(--goldDark) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.66),
        inset 0 -1px 0 rgba(142,92,20,.5),
        0 14px 34px rgba(142,92,20,.24),
        0 0 28px rgba(213,168,74,.16);
    }

    .primary::after {
      content: "";
      width: 23px;
      height: 12px;
      border-right: 2px solid #030303;
      border-top: 2px solid #030303;
      transform: rotate(45deg);
      margin-left: 20px;
      opacity: .9;
    }

    .secondary {
      color: var(--goldLight);
      background:
        linear-gradient(145deg, rgba(255,255,255,.155), rgba(255,255,255,.018) 38%, rgba(255,255,255,.055)),
        linear-gradient(180deg, rgba(3,3,3,.012), rgba(3,3,3,.092));
      border: 1px solid rgba(213,168,74,.82);
      box-shadow:
        inset 0 0 1px rgba(255,255,255,.50),
        inset 0 0 22px rgba(255,255,255,.033),
        inset 0 1px 0 rgba(255,255,255,.62),
        inset 0 13px 30px rgba(255,255,255,.045),
        inset 0 -13px 30px rgba(0,0,0,.075),
        inset 0 -1px 0 rgba(142,92,20,.28),
        0 12px 34px rgba(0,0,0,.28),
        0 0 22px rgba(213,168,74,.08);
      backdrop-filter: blur(3px) saturate(110%) brightness(105%);
      -webkit-backdrop-filter: blur(3px) saturate(110%) brightness(105%);
    }

    .secondary::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(105deg, rgba(255,255,255,.44) 0%, rgba(255,255,255,.105) 19%, rgba(255,255,255,0) 43%),
        radial-gradient(circle at 92% 0%, rgba(242,209,138,.24), rgba(242,209,138,0) 31%);
      opacity: .78;
    }

    .secondary::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 12px 0 34px rgba(255,255,255,.034),
        inset -12px 0 30px rgba(242,209,138,.04);
    }

    .isLoading .timerLabel,
    .isLoading .key,
    .isLoading .value,
    .isLoading .unit {
      color: transparent;
      text-shadow: none;
    }

    .isLoading .num {
      color: transparent;
      text-shadow: none;
    }

    .isLoading .timerLabel,
    .isLoading .num,
    .isLoading .unit,
    .isLoading .key,
    .isLoading .value {
      position: relative;
    }

    .isLoading .timerLabel::after,
    .isLoading .num::after,
    .isLoading .unit::after,
    .isLoading .key::after,
    .isLoading .value::after {
      content: "";
      position: absolute;
      inset: 12% 8%;
      border-radius: 999px;
      background:
        linear-gradient(110deg, rgba(255,255,255,.035), rgba(242,209,138,.11), rgba(255,255,255,.035));
      background-size: 220% 100%;
      animation: skeletonFlow 1.7s ease-in-out infinite;
    }

    .isLoading .num::after {
      inset: 18% 10%;
    }

    .errorState .timerLabel {
      color: var(--goldLight);
    }

    .disabled {
      pointer-events: none;
      filter: grayscale(.28) brightness(.72);
    }

    @media (hover:hover) {
      .btn:hover {
        transform: translateZ(0);
      }

      .primary:hover {
        filter: brightness(1.025);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,.70),
          inset 0 -1px 0 rgba(142,92,20,.5),
          0 16px 36px rgba(142,92,20,.26),
          0 0 30px rgba(213,168,74,.18);
      }

      .secondary:hover {
        border-color: rgba(242,209,138,.92);
        filter: brightness(1.035);
        box-shadow:
          inset 0 0 1px rgba(255,255,255,.52),
          inset 0 0 22px rgba(255,255,255,.036),
          inset 0 1px 0 rgba(255,255,255,.64),
          inset 0 13px 30px rgba(255,255,255,.048),
          inset 0 -13px 30px rgba(0,0,0,.075),
          inset 0 -1px 0 rgba(142,92,20,.28),
          0 12px 34px rgba(0,0,0,.28),
          0 0 26px rgba(213,168,74,.12);
      }
    }

    @media (max-width: 390px) {
      .content {
        padding-top: calc(56px + var(--safeTop));
      }

      .identity {
        gap: 11px;
      }

      .avatar {
        width: 39px;
        height: 39px;
        flex-basis: 39px;
      }

      .rule {
        margin-bottom: 34px;
      }

      .description {
        font-size: 15px;
        line-height: 1.58;
      }

      .spacer {
        min-height: clamp(82px, 16svh, 150px);
      }

      .timer {
        padding-left: 14px;
        padding-right: 14px;
      }

      .timerGrid {
        column-gap: 9px;
      }

      .unit {
        font-size: 10px;
      }

      .status {
        padding-left: 19px;
        padding-right: 19px;
      }

      .value {
        min-width: 96px;
      }

      .btn {
        min-height: 58px;
        font-size: 15px;
        letter-spacing: .105em;
      }
    }

    @media (max-width: 360px) {
      .content {
        padding-top: calc(44px + var(--safeTop));
        padding-bottom: calc(24px + var(--safeBottom));
      }

      .rule {
        margin-bottom: 28px;
      }

      .description {
        margin-top: 22px;
      }

      .spacer {
        min-height: 58px;
      }

      .actions {
        margin-top: 18px;
        gap: 13px;
      }
    }

    @media (min-width: 431px) {
      .page {
        box-shadow:
          0 0 0 1px rgba(255,255,255,.06),
          0 40px 100px rgba(0,0,0,.65);
      }
    }

    @keyframes pageIn {
      from { opacity: .92; }
      to { opacity: 1; }
    }

    @keyframes bgIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes luxuryShine {
      0%, 72% {
        transform: translateX(-55%) rotate(8deg);
        opacity: 0;
      }
      78% {
        opacity: .62;
      }
      100% {
        transform: translateX(55%) rotate(8deg);
        opacity: 0;
      }
    }

    @keyframes causticDrift {
      0%, 100% {
        transform: translate3d(0,0,0) scale(1);
        opacity: .46;
      }
      45% {
        transform: translate3d(7px,-5px,0) scale(1.03);
        opacity: .58;
      }
      72% {
        transform: translate3d(-5px,6px,0) scale(.98);
        opacity: .42;
      }
    }

    @keyframes numberTick {
      from {
        opacity: .75;
        transform: translateY(-2px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes skeletonFlow {
      0%, 100% {
        background-position: 110% 0;
        opacity: .55;
      }
      50% {
        background-position: -110% 0;
        opacity: .85;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="page isLoading" id="app">
    <section class="content" aria-label="Guide pass">
      <header class="hero">
        <p class="eyebrow">Добро пожаловать,</p>

        <div class="identity">
          <div class="avatar" id="avatarBox">
            <img id="avatarImg" alt="" />
          </div>
          <h1 class="name" id="userName">Сергей</h1>
        </div>

        <div class="rule" aria-hidden="true"></div>

        <h2 class="title">
          <span>Ваш отпуск</span>
          <span class="gold">уже готов</span>
        </h2>

        <p class="description">
          Ваш персональный гид по Нячангу уже готов. Осталось только начать путешествие.
        </p>
      </header>

      <div class="spacer" aria-hidden="true"></div>

      <section class="stack">
        <div class="glass timer" aria-label="Таймер доступа">
          <div class="shine" aria-hidden="true"></div>
          <div class="caustic" aria-hidden="true"></div>

          <p class="timerLabel" id="timerLabel">До окончания доступа</p>

          <div class="timerGrid">
            <div class="timerItem">
              <span class="num" id="days">00</span>
              <span class="unit">Дней</span>
            </div>

            <div class="separator" aria-hidden="true"></div>

            <div class="timerItem">
              <span class="num" id="hours">00</span>
              <span class="unit">Часов</span>
            </div>

            <div class="separator" aria-hidden="true"></div>

            <div class="timerItem">
              <span class="num" id="minutes">00</span>
              <span class="unit">Минут</span>
            </div>

            <div class="separator" aria-hidden="true"></div>

            <div class="timerItem">
              <span class="num" id="seconds">00</span>
              <span class="unit">Секунд</span>
            </div>
          </div>
        </div>

        <div class="glass status" aria-label="Статус доступа">
          <div class="shine" aria-hidden="true"></div>
          <div class="caustic" aria-hidden="true"></div>

          <div class="statusList">
            <div class="row">
              <div class="key">Статус доступа</div>
              <div class="value goldText" id="accessStatus">Проверка</div>
            </div>

            <div class="row">
              <div class="key">Действует до</div>
              <div class="value" id="validUntil">—</div>
            </div>

            <div class="row">
              <div class="key">Тариф</div>
              <div class="value goldText" id="tariff">—</div>
            </div>

            <div class="row">
              <div class="key">Период</div>
              <div class="value" id="period">—</div>
            </div>
          </div>
        </div>
      </section>

      <div class="actions">
        <button class="btn primary" type="button" data-action="start-trip">
          Начать путешествие
        </button>

        <button class="btn secondary" type="button" data-action="all-places">
          Все места и лайфхаки
        </button>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "PASTE_FIREBASE_API_KEY_HERE",
      authDomain: "PASTE_FIREBASE_AUTH_DOMAIN_HERE",
      projectId: "PASTE_FIREBASE_PROJECT_ID_HERE",
      storageBucket: "PASTE_FIREBASE_STORAGE_BUCKET_HERE",
      messagingSenderId: "PASTE_FIREBASE_MESSAGING_SENDER_ID_HERE",
      appId: "PASTE_FIREBASE_APP_ID_HERE"
    };

    const appRoot = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);

    const els = {
      userName: document.getElementById("userName"),
      avatarBox: document.getElementById("avatarBox"),
      avatarImg: document.getElementById("avatarImg"),
      timerLabel: document.getElementById("timerLabel"),
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      accessStatus: document.getElementById("accessStatus"),
      validUntil: document.getElementById("validUntil"),
      tariff: document.getElementById("tariff"),
      period: document.getElementById("period"),
      startButton: document.querySelector('[data-action="start-trip"]'),
      allPlacesButton: document.querySelector('[data-action="all-places"]')
    };

    const userId =
      params.get("tgid") ||
      params.get("userId") ||
      params.get("id") ||
      localStorage.getItem("tgid");

    let currentUserId = userId ? String(userId) : "";
    let accessUntilDate = null;
    let countdownInterval = null;

    function pad(value) {
      return String(Math.max(0, Number(value) || 0)).padStart(2, "0");
    }

    function animateValue(el, value) {
      const next = pad(value);

      if (el.textContent === next) return;

      el.textContent = next;
      el.classList.remove("tick");

      void el.offsetWidth;

      el.classList.add("tick");
    }

    function setTimer(days, hours, minutes, seconds) {
      animateValue(els.days, days);
      animateValue(els.hours, hours);
      animateValue(els.minutes, minutes);
      animateValue(els.seconds, seconds);
    }

    function setPremiumState(reason, timerLabel = "Доступ недоступен") {
      appRoot.classList.add("errorState");

      els.timerLabel.textContent = timerLabel;
      els.accessStatus.textContent = reason;
      els.validUntil.textContent = accessUntilDate ? formatDateRu(accessUntilDate) : "—";
      els.tariff.textContent = "Private Pass";
      els.period.textContent = "—";
    }

    function formatDateRu(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "—";

      return date.toLocaleDateString("ru-RU", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function normalizeDate(value) {
      if (!value) return null;

      if (value && typeof value.toDate === "function") {
        return value.toDate();
      }

      if (typeof value === "object" && typeof value.seconds === "number") {
        return new Date(value.seconds * 1000);
      }

      const date = new Date(value);

      return Number.isNaN(date.getTime()) ? null : date;
    }

    function setUserPhoto(src) {
      if (!src) return;

      els.avatarImg.src = src;

      els.avatarImg.onload = function() {
        els.avatarBox.classList.add("hasPhoto");
      };

      els.avatarImg.onerror = function() {
        els.avatarBox.classList.remove("hasPhoto");
      };
    }

    function setInactiveState(reason) {
      clearInterval(countdownInterval);
      setTimer(0, 0, 0, 0);
      setPremiumState(reason);

      els.startButton.textContent = "Продлить доступ";
      els.startButton.dataset.action = "renew-access";
      els.startButton.classList.remove("disabled");
      els.allPlacesButton.classList.add("disabled");
    }

    function setActiveState(data) {
      appRoot.classList.remove("errorState");

      els.timerLabel.textContent = "До окончания доступа";
      els.accessStatus.innerHTML = 'Доступ активен <span class="dot" aria-hidden="true"></span>';
      els.validUntil.textContent = formatDateRu(accessUntilDate);
      els.tariff.textContent = data.last_paid_tariff || data.plan || "Premium Guide";
      els.period.textContent = data.guide_days ? `${data.guide_days} дней` : "—";

      els.startButton.textContent = "Начать путешествие";
      els.startButton.dataset.action = "start-trip";
      els.startButton.classList.remove("disabled");
      els.allPlacesButton.classList.remove("disabled");

      updateCountdown();

      countdownInterval = setInterval(updateCountdown, 1000);
    }

    function updateCountdown() {
      if (!accessUntilDate) {
        setInactiveState("Доступ не найден");
        return;
      }

      const distance = accessUntilDate.getTime() - Date.now();

      if (distance <= 0) {
        setInactiveState("Доступ закончился");
        return;
      }

      const totalSeconds = Math.floor(distance / 1000);

      setTimer(
        Math.floor(totalSeconds / 86400),
        Math.floor((totalSeconds % 86400) / 3600),
        Math.floor((totalSeconds % 3600) / 60),
        totalSeconds % 60
      );
    }

    function safeName(data) {
      return (
        data.display_name ||
        params.get("displayName") ||
        params.get("firstname") ||
        params.get("username") ||
        "Гость"
      );
    }

    function hasFutureAccess(data) {
      if (!accessUntilDate) return false;
      if (data.premium === false) return false;

      return accessUntilDate.getTime() > Date.now();
    }

    async function init() {
      setTimer(0, 0, 0, 0);

      if (!currentUserId) {
        appRoot.classList.remove("isLoading");
        setInactiveState("Telegram ID не найден");
        return;
      }

      localStorage.setItem("tgid", currentUserId);

      const hasFirebaseConfig =
        firebaseConfig.apiKey &&
        !firebaseConfig.apiKey.includes("PASTE_") &&
        firebaseConfig.projectId &&
        !firebaseConfig.projectId.includes("PASTE_");

      if (!hasFirebaseConfig) {
        appRoot.classList.remove("isLoading");
        setInactiveState("Firebase не настроен");
        return;
      }

      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const doc = await db.collection("tg_users").doc(String(currentUserId)).get();

        if (!doc.exists) {
          appRoot.classList.remove("isLoading");
          setInactiveState("Пользователь не найден");
          return;
        }

        const data = doc.data() || {};

        els.userName.textContent = safeName(data);
        setUserPhoto(data.photo_url || params.get("photoUrl"));

        accessUntilDate = normalizeDate(data.access_until);

        if (!accessUntilDate) {
          appRoot.classList.remove("isLoading");
          setInactiveState("Доступ не найден");
          return;
        }

        if (!hasFutureAccess(data)) {
          appRoot.classList.remove("isLoading");
          setInactiveState("Доступ закончился");
          return;
        }

        setActiveState(data);
        appRoot.classList.remove("isLoading");
      } catch (error) {
        appRoot.classList.remove("isLoading");
        setInactiveState("Ошибка загрузки доступа");
      }
    }

    document.addEventListener("click", function(event) {
      const button = event.target.closest("[data-action]");

      if (!button || button.classList.contains("disabled")) return;

      const tgid = encodeURIComponent(currentUserId || "");

      if (button.dataset.action === "start-trip") {
        window.location.href = `route.html?tgid=${tgid}`;
      }

      if (button.dataset.action === "all-places") {
        window.location.href = `places.html?tgid=${tgid}`;
      }

      if (button.dataset.action === "renew-access") {
        window.location.href = `index.html?tgid=${tgid}`;
      }
    });

    init();
  </script>
</body>
</html>
