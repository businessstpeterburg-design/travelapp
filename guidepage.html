<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Как Местный — Guide Page</title>

  <style>
    :root {
      --gold: #ffd86b;
      --gold-soft: #fff0bd;
      --white: #ffffff;
      --muted: rgba(255,255,255,.72);
      --bg: #05070b;
      --glass: rgba(255,255,255,.12);
      --glass-border: rgba(255,255,255,.28);
      --cyan: #39d2c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background: #05070b;
    }

    .bg {
      position: absolute;
      inset: 0;
      z-index: -5;
      background-image: url("guide-bg.png");
      background-size: cover;
      background-position: 58% top;
      background-repeat: no-repeat;
      transform: scale(1.01);
    }

    .bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 78% 24%, rgba(57,210,192,.16), transparent 32%),
        radial-gradient(circle at 76% 44%, rgba(255,216,107,.13), transparent 30%),
        linear-gradient(90deg,
          rgba(0,0,0,.86) 0%,
          rgba(0,0,0,.72) 25%,
          rgba(0,0,0,.36) 52%,
          rgba(0,0,0,.08) 100%
        ),
        linear-gradient(180deg,
          rgba(0,0,0,.18) 0%,
          rgba(0,0,0,.04) 40%,
          rgba(0,0,0,.72) 100%
        );
    }

    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.42) 100%);
      mix-blend-mode: multiply;
    }

    .noise {
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: .055;
      pointer-events: none;
      background-image:
        repeating-radial-gradient(circle at 17% 32%, rgba(255,255,255,.9) 0 1px, transparent 1px 4px);
      mix-blend-mode: overlay;
    }

    .hero {
      min-height: 100svh;
      padding:
        max(72px, env(safe-area-inset-top) + 54px)
        22px
        max(28px, env(safe-area-inset-bottom) + 22px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .content {
      width: min(100%, 355px);
      animation: showUp .9s cubic-bezier(.2,.8,.2,1) both;
    }

    .hello {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 0 22px rgba(255,216,107,.32);
      margin-bottom: 11px;
    }

    .name {
      font-size: clamp(31px, 9vw, 42px);
      line-height: .92;
      font-weight: 950;
      letter-spacing: -.06em;
      margin-bottom: clamp(66px, 20svh, 138px);
      text-shadow: 0 10px 34px rgba(0,0,0,.55);
    }

    .title {
      font-size: clamp(39px, 12vw, 58px);
      line-height: .88;
      font-weight: 1000;
      letter-spacing: -.075em;
      text-transform: uppercase;
      text-shadow: 0 12px 42px rgba(0,0,0,.62);
      margin-bottom: 20px;
    }

    .title span {
      display: block;
      color: var(--gold);
      text-shadow:
        0 0 20px rgba(255,216,107,.28),
        0 12px 42px rgba(0,0,0,.62);
    }

    .desc {
      max-width: 285px;
      font-size: 15.5px;
      line-height: 1.55;
      font-weight: 560;
      color: rgba(255,255,255,.88);
      text-shadow: 0 8px 24px rgba(0,0,0,.65);
    }

    .timer-shell {
      width: 100%;
      animation: showTimer 1s cubic-bezier(.2,.8,.2,1) .18s both;
    }

    .timer {
      position: relative;
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
      padding: 21px 14px 22px;
      border-radius: 32px;
      overflow: hidden;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,.24) 0%,
          rgba(255,255,255,.105) 36%,
          rgba(255,255,255,.055) 100%
        );
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(28px) saturate(170%);
      -webkit-backdrop-filter: blur(28px) saturate(170%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.42),
        inset 0 -22px 46px rgba(0,0,0,.34),
        0 22px 60px rgba(0,0,0,.62),
        0 0 34px rgba(57,210,192,.18);
    }

    .timer::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 0%, rgba(255,255,255,.34), transparent 34%),
        radial-gradient(circle at 100% 100%, rgba(57,210,192,.24), transparent 36%),
        linear-gradient(120deg, rgba(255,255,255,.16), transparent 38%, rgba(255,255,255,.08));
    }

    .timer::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.72), transparent);
      opacity: .75;
    }

    .timer-label {
      position: relative;
      text-align: center;
      font-size: 12.5px;
      font-weight: 950;
      letter-spacing: .19em;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 22px;
      text-shadow: 0 0 18px rgba(255,216,107,.25);
    }

    .timer-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: end;
    }

    .timer-item {
      position: relative;
      text-align: center;
      min-width: 0;
    }

    .timer-item:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 4px;
      height: 60px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.44), transparent);
    }

    .num {
      font-size: clamp(36px, 11vw, 54px);
      line-height: .9;
      font-weight: 1000;
      letter-spacing: -.07em;
      color: #fff4cf;
      text-shadow:
        0 0 18px rgba(255,216,107,.22),
        0 10px 24px rgba(0,0,0,.42);
      font-variant-numeric: tabular-nums;
    }

    .txt {
      margin-top: 14px;
      font-size: 10px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,.56);
    }

    .bottom-glow {
      position: absolute;
      left: 14%;
      right: 14%;
      bottom: -80px;
      height: 190px;
      z-index: -1;
      background: radial-gradient(ellipse at center, rgba(57,210,192,.19), transparent 68%);
      filter: blur(16px);
      pointer-events: none;
    }

    @keyframes showUp {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.985);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes showTimer {
      from {
        opacity: 0;
        transform: translateY(24px) scale(.96);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @media (max-width: 430px) {
      .hero {
        padding-left: 20px;
        padding-right: 20px;
      }

      .bg {
        background-position: 61% top;
      }

      .timer {
        border-radius: 30px;
      }
    }

    @media (max-width: 390px) {
      .hero {
        padding-top: max(58px, env(safe-area-inset-top) + 42px);
      }

      .name {
        margin-bottom: 58px;
      }

      .desc {
        font-size: 15px;
      }

      .timer {
        padding-left: 10px;
        padding-right: 10px;
      }

      .timer-label {
        font-size: 11.5px;
        letter-spacing: .16em;
      }

      .txt {
        font-size: 9px;
      }
    }

    @media (min-width: 700px) {
      .hero {
        padding-left: 7vw;
        padding-right: 7vw;
      }

      .content {
        max-width: 430px;
      }

      .bg {
        background-position: center top;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="bg"></div>
    <div class="noise"></div>
    <div class="bottom-glow"></div>

    <section class="hero">
      <div class="content">
        <div class="hello">Добро пожаловать,</div>
        <div class="name" id="userName">Сергей</div>

        <h1 class="title">
          Ваш отпуск
          <span>уже готов</span>
        </h1>

        <p class="desc">
          Персональный маршрут по Нячангу уже собран.
          Осталось только начать.
        </p>
      </div>

      <div class="timer-shell">
        <div class="timer">
          <div class="timer-label">⏳ До окончания доступа</div>

          <div class="timer-grid">
            <div class="timer-item">
              <div class="num" id="days">09</div>
              <div class="txt">дней</div>
            </div>

            <div class="timer-item">
              <div class="num" id="hours">14</div>
              <div class="txt">часов</div>
            </div>

            <div class="timer-item">
              <div class="num" id="minutes">23</div>
              <div class="txt">минут</div>
            </div>

            <div class="timer-item">
              <div class="num" id="seconds">47</div>
              <div class="txt">секунд</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    const nameFromUrl =
      params.get("name") ||
      params.get("firstname") ||
      params.get("displayName");

    if (nameFromUrl) {
      document.getElementById("userName").textContent = decodeURIComponent(nameFromUrl);
    }

    const accessFromUrl = params.get("access_until");

    let accessUntil;

    if (accessFromUrl) {
      accessUntil = new Date(accessFromUrl);
    } else {
      accessUntil = new Date();
      accessUntil.setDate(accessUntil.getDate() + 9);
      accessUntil.setHours(accessUntil.getHours() + 14);
      accessUntil.setMinutes(accessUntil.getMinutes() + 23);
      accessUntil.setSeconds(accessUntil.getSeconds() + 47);
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function setTimerToZero() {
      document.getElementById("days").textContent = "00";
      document.getElementById("hours").textContent = "00";
      document.getElementById("minutes").textContent = "00";
      document.getElementById("seconds").textContent = "00";
    }

    function updateTimer() {
      const now = new Date();
      const diff = accessUntil - now;

      if (!accessUntil || isNaN(accessUntil.getTime()) || diff <= 0) {
        setTimerToZero();
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = pad(days);
      document.getElementById("hours").textContent = pad(hours);
      document.getElementById("minutes").textContent = pad(minutes);
      document.getElementById("seconds").textContent = pad(seconds);
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
