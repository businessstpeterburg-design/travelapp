<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05070b" />
  <title>Как Местный — Guide Page</title>

  <style>
    :root {
      --bg: #05070b;
      --gold: #ffd86b;
      --gold-light: #fff0bf;
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.84);
      --cyan: #39d2c0;
      --screen: 430px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
    }

    .viewport {
      width: 100%;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 10%, rgba(57, 210, 192, 0.13), transparent 38%),
        radial-gradient(circle at 50% 90%, rgba(255, 216, 107, 0.08), transparent 42%),
        #020407;
    }

    .guidepage {
      position: relative;
      width: 100%;
      max-width: var(--screen);
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background: #020407;
      box-shadow: 0 0 90px rgba(0, 0, 0, 0.75);
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: -10;
      background-image: url("guide-bg.png");
      background-size: cover;
      background-position: 66% -48px;
      background-repeat: no-repeat;
      transform: scale(1.035);
      transform-origin: 66% top;
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.72) 0%,
          rgba(0, 0, 0, 0.62) 25%,
          rgba(0, 0, 0, 0.30) 50%,
          rgba(0, 0, 0, 0.06) 100%
        ),
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.06) 0%,
          rgba(0, 0, 0, 0.00) 44%,
          rgba(0, 0, 0, 0.70) 100%
        );
      pointer-events: none;
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 77% 18%, rgba(255, 216, 107, 0.22), transparent 29%),
        radial-gradient(circle at 78% 39%, rgba(57, 210, 192, 0.18), transparent 32%),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.42) 100%);
      mix-blend-mode: screen;
      opacity: 0.78;
      pointer-events: none;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: -8;
      opacity: 0.050;
      pointer-events: none;
      background-image:
        repeating-radial-gradient(circle at 16% 27%, rgba(255,255,255,0.95) 0 1px, transparent 1px 4px);
      mix-blend-mode: overlay;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: -7;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 62% 38%, transparent 34%, rgba(0,0,0,0.33) 100%),
        linear-gradient(180deg, transparent 58%, rgba(0,0,0,0.52) 100%);
    }

    .hero {
      position: relative;
      min-height: 100svh;
      padding:
        max(66px, env(safe-area-inset-top) + 48px)
        24px
        max(24px, env(safe-area-inset-bottom) + 18px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 26px;
    }

    .hero-copy {
      width: 100%;
      max-width: 292px;
      animation: heroIn 850ms cubic-bezier(.2,.8,.2,1) both;
    }

    .eyebrow {
      font-size: 11.5px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 13px;
      text-shadow:
        0 0 18px rgba(255, 216, 107, 0.42),
        0 8px 22px rgba(0,0,0,0.70);
    }

    .username {
      font-size: 32px;
      line-height: 0.94;
      font-weight: 950;
      letter-spacing: -0.065em;
      color: #fff;
      margin-bottom: clamp(88px, 18.8svh, 142px);
      text-shadow:
        0 16px 38px rgba(0,0,0,0.78),
        0 0 1px rgba(255,255,255,0.88);
    }

    .title {
      max-width: 260px;
      font-size: 38px;
      line-height: 0.91;
      font-weight: 1000;
      letter-spacing: -0.074em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 22px;
      text-shadow:
        0 16px 44px rgba(0,0,0,0.82),
        0 0 1px rgba(255,255,255,0.88);
    }

    .title .gold {
      display: block;
      color: var(--gold);
      text-shadow:
        0 0 22px rgba(255, 216, 107, 0.38),
        0 16px 44px rgba(0,0,0,0.82);
    }

    .description {
      max-width: 275px;
      font-size: 14.8px;
      line-height: 1.52;
      font-weight: 560;
      color: var(--muted);
      text-shadow: 0 8px 26px rgba(0,0,0,0.75);
    }

    .timer-zone {
      position: relative;
      width: 100%;
      padding-bottom: 2px;
      animation: timerIn 900ms cubic-bezier(.2,.8,.2,1) 120ms both;
    }

    .timer-zone::before {
      content: "";
      position: absolute;
      left: -10px;
      right: -10px;
      top: -30px;
      height: 145px;
      z-index: -1;
      background:
        radial-gradient(ellipse at 20% 35%, rgba(255,255,255,0.12), transparent 55%),
        radial-gradient(ellipse at 70% 55%, rgba(57,210,192,0.25), transparent 66%);
      filter: blur(20px);
      pointer-events: none;
    }

    .liquid-glass {
      position: relative;
      width: 100%;
      min-height: 154px;
      padding: 22px 14px 23px;
      border-radius: 34px;
      overflow: hidden;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.24) 0%,
          rgba(255,255,255,0.10) 28%,
          rgba(0,0,0,0.20) 58%,
          rgba(57,210,192,0.18) 100%
        );
      border: 1px solid rgba(255,255,255,0.38);
      backdrop-filter: blur(34px) saturate(190%) brightness(1.08);
      -webkit-backdrop-filter: blur(34px) saturate(190%) brightness(1.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.68),
        inset 0 -28px 54px rgba(0,0,0,0.52),
        inset 20px 0 44px rgba(255,255,255,0.12),
        inset -24px 0 54px rgba(57,210,192,0.16),
        0 24px 72px rgba(0,0,0,0.70),
        0 0 30px rgba(57,210,192,0.30),
        0 0 0 1px rgba(255,255,255,0.08);
      transform: translateZ(0);
    }

    .liquid-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 8% -4%, rgba(255,255,255,0.56), transparent 34%),
        radial-gradient(circle at 102% 104%, rgba(57,210,192,0.36), transparent 38%),
        linear-gradient(116deg, rgba(255,255,255,0.20), transparent 36%, rgba(255,255,255,0.075));
      pointer-events: none;
    }

    .liquid-glass::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.92), transparent);
      opacity: 0.96;
      pointer-events: none;
    }

    .glass-reflection {
      position: absolute;
      inset: -76px -110px auto auto;
      width: 270px;
      height: 190px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.28), transparent 62%);
      transform: rotate(-18deg);
      opacity: 0.64;
      pointer-events: none;
    }

    .glass-lens {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 12px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.015));
      filter: blur(2px);
      opacity: 0.62;
      pointer-events: none;
    }

    .glass-shadow {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 5px;
      height: 38px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.50), transparent 72%);
      pointer-events: none;
    }

    .timer-label {
      position: relative;
      z-index: 2;
      text-align: center;
      font-size: 12.2px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0.19em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 24px;
      text-shadow:
        0 0 18px rgba(255,216,107,0.40),
        0 8px 22px rgba(0,0,0,0.60);
    }

    .timer-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: end;
    }

    .timer-cell {
      position: relative;
      text-align: center;
      min-width: 0;
    }

    .timer-cell:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 4px;
      width: 1px;
      height: 62px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.56), transparent);
      opacity: 0.90;
    }

    .timer-number {
      font-size: 43px;
      line-height: 0.88;
      font-weight: 1000;
      letter-spacing: -0.07em;
      color: #fff3ca;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 22px rgba(255,216,107,0.30),
        0 12px 28px rgba(0,0,0,0.52);
    }

    .timer-caption {
      margin-top: 15px;
      font-size: 9.3px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.60);
      text-shadow: 0 6px 14px rgba(0,0,0,0.50);
    }

    @keyframes heroIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes timerIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @media (max-width: 390px) {
      .hero {
        padding-top: max(58px, env(safe-area-inset-top) + 42px);
        padding-left: 21px;
        padding-right: 21px;
      }

      .background {
        background-position: 67% -40px;
      }

      .username {
        font-size: 31px;
        margin-bottom: clamp(74px, 16.5svh, 116px);
      }

      .title {
        max-width: 238px;
        font-size: 35px;
      }

      .description {
        max-width: 255px;
        font-size: 14.5px;
      }

      .liquid-glass {
        min-height: 148px;
        border-radius: 30px;
        padding: 21px 10px 22px;
      }

      .timer-label {
        font-size: 10.9px;
        letter-spacing: 0.16em;
        margin-bottom: 23px;
      }

      .timer-number {
        font-size: 37px;
      }

      .timer-caption {
        font-size: 8.4px;
      }
    }

    @media (min-width: 700px) {
      .guidepage {
        max-width: 430px;
      }
    }
  </style>
</head>

<body>
  <main class="viewport">
    <section class="guidepage" aria-label="Ваш гид по Нячангу">
      <div class="background" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>

      <section class="hero">
        <div class="hero-copy">
          <div class="eyebrow">Добро пожаловать,</div>
          <div class="username" id="userName">Сергей</div>

          <h1 class="title">
            Ваш отпуск
            <span class="gold">уже готов</span>
          </h1>

          <p class="description">
            Персональный маршрут по Нячангу уже собран.<br />
            Осталось только начать.
          </p>
        </div>

        <div class="timer-zone">
          <div class="liquid-glass" id="glassTimer">
            <div class="glass-reflection" aria-hidden="true"></div>
            <div class="glass-lens" aria-hidden="true"></div>
            <div class="glass-shadow" aria-hidden="true"></div>

            <div class="timer-label">⏳ До окончания доступа</div>

            <div class="timer-grid">
              <div class="timer-cell">
                <div class="timer-number" id="days">09</div>
                <div class="timer-caption">дней</div>
              </div>

              <div class="timer-cell">
                <div class="timer-number" id="hours">14</div>
                <div class="timer-caption">часов</div>
              </div>

              <div class="timer-cell">
                <div class="timer-number" id="minutes">23</div>
                <div class="timer-caption">минут</div>
              </div>

              <div class="timer-cell">
                <div class="timer-number" id="seconds">47</div>
                <div class="timer-caption">секунд</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    const nameFromUrl =
      params.get("displayName") ||
      params.get("firstname") ||
      params.get("name");

    if (nameFromUrl) {
      document.getElementById("userName").textContent = decodeURIComponent(nameFromUrl);
    }

    const accessFromUrl = params.get("access_until");
    let accessUntil;

    if (accessFromUrl) {
      accessUntil = new Date(accessFromUrl);
    }

    if (!accessUntil || Number.isNaN(accessUntil.getTime())) {
      accessUntil = new Date();
      accessUntil.setDate(accessUntil.getDate() + 9);
      accessUntil.setHours(accessUntil.getHours() + 14);
      accessUntil.setMinutes(accessUntil.getMinutes() + 23);
      accessUntil.setSeconds(accessUntil.getSeconds() + 47);
    }

    const elDays = document.getElementById("days");
    const elHours = document.getElementById("hours");
    const elMinutes = document.getElementById("minutes");
    const elSeconds = document.getElementById("seconds");

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function zeroTimer() {
      elDays.textContent = "00";
      elHours.textContent = "00";
      elMinutes.textContent = "00";
      elSeconds.textContent = "00";
    }

    function updateTimer() {
      const diff = accessUntil.getTime() - Date.now();

      if (diff <= 0) {
        zeroTimer();
        return;
      }

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor(diff / 3600000) % 24;
      const minutes = Math.floor(diff / 60000) % 60;
      const seconds = Math.floor(diff / 1000) % 60;

      elDays.textContent = pad(days);
      elHours.textContent = pad(hours);
      elMinutes.textContent = pad(minutes);
      elSeconds.textContent = pad(seconds);
    }

    updateTimer();
    window.setInterval(updateTimer, 1000);

    const glass = document.getElementById("glassTimer");
    const canHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

    if (glass && canHover) {
      window.addEventListener("mousemove", (event) => {
        const x = (event.clientX / window.innerWidth - 0.5) * 8;
        const y = (event.clientY / window.innerHeight - 0.5) * 8;
        glass.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      });
    }
  </script>
</body>
</html>
