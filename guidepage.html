<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#030303"><title>Как Местный — Guide Pass</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#030303;--deep:#020407;--white:#fff;--goldLight:#F2D18A;--gold:#D5A84A;--goldDark:#8E5C14;--w:430px;--x:clamp(22px,6vw,34px)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--black);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;overflow-x:hidden}body{display:flex;justify-content:center}.page{position:relative;width:100%;max-width:var(--w);min-height:100svh;overflow:hidden;background:var(--black);isolation:isolate}.page:before{content:"";position:fixed;inset:0;left:50%;width:100%;max-width:var(--w);transform:translateX(-50%);background-image:linear-gradient(180deg,rgba(2,4,7,.04),rgba(2,4,7,.08) 32%,rgba(3,3,3,.5) 58%,rgba(3,3,3,.9)),linear-gradient(90deg,rgba(2,4,7,.48),rgba(2,4,7,.20) 42%,rgba(2,4,7,.02)),url("guide-bg.png");background-size:cover;background-position:center top,center top,center -24px;background-repeat:no-repeat;z-index:-3}.page:after{content:"";position:fixed;inset:0;left:50%;width:100%;max-width:var(--w);transform:translateX(-50%);background:radial-gradient(circle at 84% 28%,rgba(242,209,138,.12),transparent 26%),linear-gradient(180deg,transparent,rgba(3,3,3,.12) 44%,rgba(3,3,3,.8) 88%,#030303);z-index:-2}.content{min-height:100svh;padding:calc(70px + env(safe-area-inset-top,0px)) var(--x) calc(34px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column}.hero{width:min(292px,76vw);animation:in .9s cubic-bezier(.2,.8,.2,1) both}.eyebrow{margin:0 0 8px;color:var(--goldLight);font-size:13px;letter-spacing:.09em;text-transform:uppercase}.name{margin:0;font-size:clamp(33px,10vw,45px);line-height:1.04;letter-spacing:-.035em;font-weight:300}.rule{width:25px;height:1px;margin:22px 0 40px;background:linear-gradient(90deg,var(--goldLight),var(--goldDark))}.title{margin:0;font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(43px,13vw,61px);line-height:.94;letter-spacing:-.035em;font-weight:300;text-transform:uppercase}.title span{display:block}.title .gold{color:var(--goldLight)}.desc{margin:27px 0 0;max-width:295px;color:rgba(255,255,255,.78);font-size:16px;line-height:1.62}.spacer{flex:1;min-height:clamp(90px,18svh,170px)}.stack{display:grid;gap:16px;animation:up .9s cubic-bezier(.2,.8,.2,1) .15s both}.glass{position:relative;overflow:hidden;border-radius:21px;background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.025) 42%,rgba(255,255,255,.055)),linear-gradient(180deg,rgba(3,3,3,.06),rgba(3,3,3,.20));border:1px solid rgba(242,209,138,.42);box-shadow:inset 0 1px 0 rgba(255,255,255,.58),inset 0 -1px 0 rgba(142,92,20,.28),0 18px 46px rgba(0,0,0,.42),0 0 28px rgba(213,168,74,.09);backdrop-filter:blur(3px) saturate(110%) brightness(105%);-webkit-backdrop-filter:blur(3px) saturate(110%) brightness(105%)}.glass:before{content:"";position:absolute;inset:0;background:linear-gradient(105deg,rgba(255,255,255,.34),rgba(255,255,255,.075) 16%,transparent 36%),radial-gradient(circle at 92% 0%,rgba(242,209,138,.24),transparent 28%);pointer-events:none}.timer{padding:21px 18px 19px}.timer-label{position:relative;z-index:1;margin:0 0 14px;text-align:center;color:var(--goldLight);font-size:12px;letter-spacing:.12em;text-transform:uppercase}.timer-grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;align-items:center;gap:13px}.cell{text-align:center}.num{display:block;font-size:clamp(40px,12vw,56px);line-height:.96;font-weight:300;letter-spacing:-.045em;font-variant-numeric:tabular-nums}.unit{display:block;margin-top:12px;color:var(--goldLight);font-size:11px;text-transform:uppercase}.sep{width:1px;height:54px;background:linear-gradient(180deg,transparent,rgba(242,209,138,.62),transparent)}.status{padding:18px 21px}.row{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;min-height:44px;border-bottom:1px solid rgba(255,255,255,.095)}.row:last-child{border-bottom:0}.key{color:rgba(255,255,255,.88);font-size:15px;font-weight:300}.val{font-size:14px;text-align:right;white-space:nowrap}.goldText{color:var(--goldLight)}.dot{display:inline-block;width:6px;height:6px;margin-left:6px;border-radius:999px;background:var(--gold);box-shadow:0 0 10px rgba(213,168,74,.65)}.actions{display:grid;gap:17px;margin-top:22px;animation:up 1s cubic-bezier(.2,.8,.2,1) .25s both}.btn{width:100%;min-height:60px;border-radius:16px;text-transform:uppercase;font-size:17px;letter-spacing:.115em;font-weight:500}.btn:active{transform:scale(.985)}.primary{color:#030303;background:linear-gradient(180deg,rgba(255,255,255,.32),transparent 34%),linear-gradient(135deg,var(--goldLight),var(--gold) 52%,var(--goldDark));box-shadow:0 14px 34px rgba(142,92,20,.24)}.primary:after{content:"";display:inline-block;width:23px;height:12px;border-right:2px solid #030303;border-top:2px solid #030303;transform:rotate(45deg);margin-left:18px}.secondary{color:var(--goldLight);background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.015)),linear-gradient(180deg,rgba(3,3,3,.06),rgba(3,3,3,.16));border:1px solid rgba(213,168,74,.82);backdrop-filter:blur(3px) saturate(110%) brightness(105%)}.message{display:none;margin-top:20px;padding:14px 16px;color:rgba(255,255,255,.82);font-size:14px;text-align:center}.is-error .message{display:block}.disabled{pointer-events:none;filter:grayscale(.28) brightness(.72)}@media(max-width:390px){.content{padding-top:calc(56px + env(safe-area-inset-top,0px))}.spacer{min-height:clamp(82px,16svh,150px)}.timer-grid{gap:9px}.btn{font-size:15px}}@keyframes in{from{opacity:0;transform:translateY(18px)}to{opacity:1}}@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1}}
</style>
</head>
<body>
<main class="page is-loading" id="app"><section class="content"><header class="hero"><p class="eyebrow">Добро пожаловать,</p><h1 class="name" id="userName">Сергей</h1><div class="rule"></div><h2 class="title"><span>Ваш отпуск</span><span class="gold">уже готов</span></h2><p class="desc">Ваш персональный гид по Нячангу уже готов. Осталось только начать путешествие.</p></header><div class="spacer"></div><section class="stack"><div class="glass timer"><p class="timer-label" id="timerLabel">До окончания доступа</p><div class="timer-grid"><div class="cell"><span class="num" id="days">00</span><span class="unit">Дней</span></div><div class="sep"></div><div class="cell"><span class="num" id="hours">00</span><span class="unit">Часов</span></div><div class="sep"></div><div class="cell"><span class="num" id="minutes">00</span><span class="unit">Минут</span></div><div class="sep"></div><div class="cell"><span class="num" id="seconds">00</span><span class="unit">Секунд</span></div></div></div><div class="glass status"><div class="row"><div class="key">Статус доступа</div><div class="val goldText" id="accessStatus">Проверка</div></div><div class="row"><div class="key">Действует до</div><div class="val" id="validUntil">—</div></div><div class="row"><div class="key">Тариф</div><div class="val goldText" id="tariff">—</div></div><div class="row"><div class="key">Период</div><div class="val" id="period">—</div></div></div></section><div class="actions"><button class="btn primary" data-action="start-trip">Начать путешествие</button><button class="btn secondary" data-action="all-places">Все места и лайфхаки</button></div><div class="message glass" id="message"></div></section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"PASTE_FIREBASE_API_KEY_HERE",authDomain:"PASTE_FIREBASE_AUTH_DOMAIN_HERE",projectId:"PASTE_FIREBASE_PROJECT_ID_HERE",storageBucket:"PASTE_FIREBASE_STORAGE_BUCKET_HERE",messagingSenderId:"PASTE_FIREBASE_MESSAGING_SENDER_ID_HERE",appId:"PASTE_FIREBASE_APP_ID_HERE"};
const app=document.getElementById("app"),p=new URLSearchParams(location.search),u=p.get("tgid")||p.get("userId")||p.get("id")||localStorage.getItem("tgid"),e={name:document.getElementById("userName"),label:document.getElementById("timerLabel"),d:document.getElementById("days"),h:document.getElementById("hours"),m:document.getElementById("minutes"),s:document.getElementById("seconds"),status:document.getElementById("accessStatus"),until:document.getElementById("validUntil"),tariff:document.getElementById("tariff"),period:document.getElementById("period"),msg:document.getElementById("message"),start:document.querySelector('[data-action="start-trip"]'),places:document.querySelector('[data-action="all-places"]')};let date=null,timer=null,userId=u?String(u):"";function pad(n){return String(Math.max(0,Number(n)||0)).padStart(2,"0")}function setT(d,h,m,s){e.d.textContent=pad(d);e.h.textContent=pad(h);e.m.textContent=pad(m);e.s.textContent=pad(s)}function msg(t){e.msg.textContent=t||"";app.classList.toggle("is-error",!!t)}function fdate(x){return x instanceof Date&&!isNaN(x)?x.toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"}):"—"}function norm(v){if(!v)return null;if(v.toDate)return v.toDate();if(v.seconds)return new Date(v.seconds*1000);let d=new Date(v);return isNaN(d)?null:d}function off(r){clearInterval(timer);setT(0,0,0,0);e.label.textContent="Доступ недоступен";e.status.textContent=r;e.until.textContent=date?fdate(date):"—";e.start.textContent="Продлить доступ";e.start.dataset.action="renew-access";e.start.classList.remove("disabled");e.places.classList.add("disabled")}function tick(){if(!date){off("Доступ не найден");return}let ms=date.getTime()-Date.now();if(ms<=0){off("Доступ закончился");return}let x=Math.floor(ms/1000);setT(Math.floor(x/86400),Math.floor(x%86400/3600),Math.floor(x%3600/60),x%60)}function on(data){e.status.innerHTML='Доступ активен <span class="dot"></span>';e.until.textContent=fdate(date);e.tariff.textContent=data.last_paid_tariff||data.plan||"Premium Guide";e.period.textContent=data.guide_days?`${data.guide_days} дней`:"—";e.start.textContent="Начать путешествие";e.start.dataset.action="start-trip";e.start.classList.remove("disabled");e.places.classList.remove("disabled");tick();timer=setInterval(tick,1000)}async function init(){setT(0,0,0,0);if(!userId){app.classList.remove("is-loading");off("Telegram ID не найден");msg("Telegram ID не найден");return}localStorage.setItem("tgid",userId);let ok=firebaseConfig.apiKey&&!firebaseConfig.apiKey.includes("PASTE_")&&firebaseConfig.projectId&&!firebaseConfig.projectId.includes("PASTE_");if(!ok){app.classList.remove("is-loading");off("Доступ не найден");msg("Firebase не настроен в guidepage.html");return}try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);let doc=await firebase.firestore().collection("tg_users").doc(userId).get();if(!doc.exists){app.classList.remove("is-loading");off("Пользователь не найден");msg("Пользователь не найден");return}let data=doc.data()||{};e.name.textContent=data.display_name||p.get("displayName")||p.get("firstname")||p.get("username")||"Гость";date=norm(data.access_until);if(!date){app.classList.remove("is-loading");off("Доступ не найден");msg("Доступ не найден");return}if(data.premium===false||date.getTime()<=Date.now()){app.classList.remove("is-loading");off("Доступ закончился");msg("Доступ закончился");return}msg("");on(data);app.classList.remove("is-loading")}catch(err){app.classList.remove("is-loading");off("Доступ не найден");msg("Ошибка загрузки доступа")}}document.addEventListener("click",ev=>{let b=ev.target.closest("[data-action]");if(!b||b.classList.contains("disabled"))return;let id=encodeURIComponent(userId||"");if(b.dataset.action==="start-trip")location.href=`route.html?tgid=${id}`;if(b.dataset.action==="all-places")location.href=`places.html?tgid=${id}`;if(b.dataset.action==="renew-access")location.href=`index.html?tgid=${id}`});init();
</script>
</body></html>
