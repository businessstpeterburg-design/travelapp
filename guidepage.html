<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05070b" />
  <title>Как Местный — Guide Page</title>

  <style>
    :root {
      --bg: #05070b;
      --gold: #ffd86b;
      --gold-soft: #ffe7a3;
      --cream: #fff3ca;
      --white: #ffffff;
      --muted: rgba(255,255,255,.84);
      --muted-soft: rgba(255,255,255,.58);
      --cyan: #39d2c0;
      --screen: 430px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body { min-height: 100svh; }

    .viewport {
      width: 100%;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 8%, rgba(57,210,192,.10), transparent 38%),
        radial-gradient(circle at 50% 94%, rgba(255,216,107,.07), transparent 44%),
        #020407;
    }

    .guidepage {
      position: relative;
      width: 100%;
      max-width: var(--screen);
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background: #020407;
      box-shadow: 0 0 90px rgba(0,0,0,.78);
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: -10;
      background-image: url("guide-bg.png");
      background-size: cover;
      background-position: 65% -52px;
      background-repeat: no-repeat;
      transform: scale(1.03);
      transform-origin: 65% top;
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg,
          rgba(0,0,0,.66) 0%,
          rgba(0,0,0,.55) 29%,
          rgba(0,0,0,.25) 53%,
          rgba(0,0,0,.04) 100%),
        linear-gradient(180deg,
          rgba(0,0,0,.05) 0%,
          rgba(0,0,0,0) 42%,
          rgba(0,0,0,.66) 100%);
      pointer-events: none;
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 78% 15%, rgba(255,216,107,.24), transparent 26%),
        radial-gradient(circle at 77% 37%, rgba(57,210,192,.18), transparent 30%),
        radial-gradient(ellipse at center, transparent 46%, rgba(0,0,0,.40) 100%);
      mix-blend-mode: screen;
      opacity: .80;
      pointer-events: none;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: -8;
      opacity: .042;
      pointer-events: none;
      background-image: repeating-radial-gradient(circle at 18% 24%, rgba(255,255,255,.9) 0 1px, transparent 1px 4px);
      mix-blend-mode: overlay;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: -7;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 64% 38%, transparent 36%, rgba(0,0,0,.31) 100%),
        linear-gradient(180deg, transparent 58%, rgba(0,0,0,.48) 100%);
    }

    .hero {
      position: relative;
      min-height: 100svh;
      padding: max(64px, env(safe-area-inset-top) + 46px) 24px max(24px, env(safe-area-inset-bottom) + 18px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
    }

    .hero-copy {
      width: 100%;
      max-width: 292px;
      animation: heroIn 900ms cubic-bezier(.2,.8,.2,1) both;
    }

    .eyebrow {
      font-size: 11.5px;
      line-height: 1;
      font-weight: 820;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 13px;
      text-shadow: 0 0 16px rgba(255,216,107,.38), 0 8px 22px rgba(0,0,0,.68);
    }

    .username {
      font-size: 32px;
      line-height: .98;
      font-weight: 780;
      letter-spacing: 0;
      color: #fff;
      margin-bottom: clamp(88px, 18.6svh, 142px);
      text-shadow: 0 15px 36px rgba(0,0,0,.78), 0 0 1px rgba(255,255,255,.82);
    }

    .title {
      max-width: 302px;
      font-size: 35px;
      line-height: 1.05;
      font-weight: 780;
      letter-spacing: .01em;
      word-spacing: .04em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 21px;
      text-shadow: 0 15px 38px rgba(0,0,0,.82), 0 0 1px rgba(255,255,255,.82);
    }

    .title .gold {
      display: block;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,216,107,.36), 0 15px 38px rgba(0,0,0,.82);
    }

    .description {
      max-width: 278px;
      font-size: 14.6px;
      line-height: 1.54;
      font-weight: 470;
      color: var(--muted);
      text-shadow: 0 8px 24px rgba(0,0,0,.72);
    }

    .timer-zone {
      position: relative;
      width: 100%;
      padding-bottom: 2px;
      animation: timerIn 960ms cubic-bezier(.2,.8,.2,1) 140ms both;
    }

    .timer-zone::before {
      content: "";
      position: absolute;
      left: -16px;
      right: -16px;
      top: -36px;
      height: 170px;
      z-index: -1;
      background:
        radial-gradient(ellipse at 12% 36%, rgba(255,255,255,.18), transparent 50%),
        radial-gradient(ellipse at 78% 64%, rgba(57,210,192,.34), transparent 70%),
        radial-gradient(ellipse at 50% 18%, rgba(255,216,107,.15), transparent 56%);
      filter: blur(22px);
      pointer-events: none;
    }

    .sapphire-glass {
      position: relative;
      width: 100%;
      min-height: 156px;
      padding: 22px 14px 23px;
      border-radius: 34px;
      overflow: hidden;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,.115) 0%,
          rgba(255,255,255,.038) 29%,
          rgba(255,255,255,.014) 54%,
          rgba(57,210,192,.070) 100%);
      border: 1px solid rgba(255,255,255,.54);
      backdrop-filter: blur(10px) saturate(165%) brightness(1.18) contrast(1.05);
      -webkit-backdrop-filter: blur(10px) saturate(165%) brightness(1.18) contrast(1.05);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        inset 0 -1px 0 rgba(255,255,255,.30),
        inset 14px 0 30px rgba(255,255,255,.11),
        inset -20px 0 42px rgba(57,210,192,.14),
        inset 0 -24px 42px rgba(0,0,0,.18),
        0 22px 62px rgba(0,0,0,.55),
        0 0 26px rgba(57,210,192,.36),
        0 0 0 1px rgba(255,255,255,.10);
      transform: translateZ(0);
    }

    .sapphire-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 6% -8%, rgba(255,255,255,.74), transparent 30%),
        radial-gradient(circle at 103% 108%, rgba(57,210,192,.44), transparent 40%),
        radial-gradient(ellipse at 48% 18%, rgba(255,255,255,.18), transparent 62%),
        linear-gradient(114deg, rgba(255,255,255,.32), transparent 31%, rgba(255,255,255,.065)),
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 48%, rgba(255,255,255,.045));
      opacity: .92;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .sapphire-glass::after {
      content: "";
      position: absolute;
      left: 17px;
      right: 17px;
      top: 1px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,1), rgba(255,240,190,.62), transparent);
      opacity: .96;
      filter: blur(.25px);
      pointer-events: none;
    }

    .glass-edge {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.30),
        inset 0 0 18px rgba(255,255,255,.13),
        inset 0 0 38px rgba(57,210,192,.08);
      opacity: .95;
    }

    .glass-reflection {
      position: absolute;
      right: -120px;
      top: -82px;
      width: 300px;
      height: 205px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,.34), transparent 61%);
      transform: rotate(-18deg);
      opacity: .72;
      pointer-events: none;
      animation: reflectionDrift 9s ease-in-out infinite;
    }

    .glass-reflection-2 {
      position: absolute;
      left: -68px;
      bottom: -44px;
      width: 180px;
      height: 138px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(255,216,107,.22), transparent 62%);
      opacity: .55;
      filter: blur(1px);
      pointer-events: none;
      animation: reflectionDrift2 11s ease-in-out infinite;
    }

    .glass-lens {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 10px;
      height: 58px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.012));
      filter: blur(2px);
      opacity: .74;
      pointer-events: none;
    }

    .glass-caustic {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      opacity: .56;
      background:
        linear-gradient(105deg, transparent 0%, rgba(255,255,255,.18) 18%, transparent 34%),
        linear-gradient(292deg, transparent 10%, rgba(57,210,192,.18) 50%, transparent 72%),
        radial-gradient(ellipse at 80% 84%, rgba(255,255,255,.16), transparent 34%);
      mix-blend-mode: screen;
      animation: causticMove 12s ease-in-out infinite;
    }

    .glass-bottom-refract {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 7px;
      height: 26px;
      border-radius: 0 0 28px 28px;
      background: linear-gradient(90deg,
        rgba(255,216,107,.30),
        rgba(255,255,255,.10),
        rgba(57,210,192,.34));
      opacity: .42;
      filter: blur(5px);
      pointer-events: none;
    }

    .timer-label {
      position: relative;
      z-index: 2;
      text-align: center;
      font-size: 12px;
      line-height: 1;
      font-weight: 780;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 25px;
      text-shadow: 0 0 16px rgba(255,216,107,.42), 0 8px 22px rgba(0,0,0,.58);
    }

    .timer-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: end;
    }

    .timer-cell { position: relative; text-align: center; min-width: 0; }

    .timer-cell:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 4px;
      width: 1px;
      height: 62px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.58), transparent);
      opacity: .92;
    }

    .timer-number {
      font-size: 43px;
      line-height: .92;
      font-weight: 760;
      letter-spacing: .01em;
      color: var(--cream);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 18px rgba(255,216,107,.22), 0 12px 26px rgba(0,0,0,.46);
    }

    .timer-caption {
      margin-top: 15px;
      font-size: 9.3px;
      line-height: 1;
      font-weight: 660;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted-soft);
      text-shadow: 0 6px 14px rgba(0,0,0,.46);
    }

    @keyframes heroIn { from { opacity:0; transform: translateY(18px) scale(.985); filter: blur(8px); } to { opacity:1; transform: translateY(0) scale(1); filter: blur(0); } }
    @keyframes timerIn { from { opacity:0; transform: translateY(24px) scale(.96); filter: blur(10px); } to { opacity:1; transform: translateY(0) scale(1); filter: blur(0); } }
    @keyframes reflectionDrift { 0%,100% { transform: translate3d(0,0,0) rotate(-18deg); opacity:.66; } 50% { transform: translate3d(-16px,10px,0) rotate(-14deg); opacity:.78; } }
    @keyframes reflectionDrift2 { 0%,100% { transform: translate3d(0,0,0) scale(1); opacity:.46; } 50% { transform: translate3d(18px,-8px,0) scale(1.08); opacity:.60; } }
    @keyframes causticMove { 0%,100% { transform: translateX(-8px); opacity:.38; } 50% { transform: translateX(10px); opacity:.58; } }

    @media (max-width: 390px) {
      .hero { padding-top: max(58px, env(safe-area-inset-top) + 42px); padding-left: 21px; padding-right: 21px; }
      .background { background-position: 66% -42px; }
      .username { font-size: 31px; margin-bottom: clamp(76px, 16.5svh, 116px); }
      .title { max-width: 270px; font-size: 33px; line-height: 1.08; letter-spacing: .012em; }
      .description { max-width: 255px; font-size: 14.4px; }
      .sapphire-glass { min-height: 148px; border-radius: 30px; padding: 21px 10px 22px; }
      .timer-label { font-size: 10.8px; letter-spacing: .15em; margin-bottom: 23px; }
      .timer-number { font-size: 37px; letter-spacing: .01em; }
      .timer-caption { font-size: 8.4px; }
    }

    @media (min-width: 700px) { .guidepage { max-width: 430px; } }
  </style>
</head>

<body>
  <main class="viewport">
    <section class="guidepage" aria-label="Ваш гид по Нячангу">
      <div class="background" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>

      <section class="hero">
        <div class="hero-copy">
          <div class="eyebrow">Добро пожаловать,</div>
          <div class="username" id="userName">Сергей</div>

          <h1 class="title">
            Ваш отпуск
            <span class="gold">уже готов</span>
          </h1>

          <p class="description">
            Персональный маршрут по Нячангу уже собран.<br />
            Осталось только начать.
          </p>
        </div>

        <div class="timer-zone">
          <div class="sapphire-glass" id="glassTimer">
            <div class="glass-reflection" aria-hidden="true"></div>
            <div class="glass-reflection-2" aria-hidden="true"></div>
            <div class="glass-lens" aria-hidden="true"></div>
            <div class="glass-caustic" aria-hidden="true"></div>
            <div class="glass-bottom-refract" aria-hidden="true"></div>
            <div class="glass-edge" aria-hidden="true"></div>

            <div class="timer-label">⏳ До окончания доступа</div>

            <div class="timer-grid">
              <div class="timer-cell">
                <div class="timer-number" id="days">09</div>
                <div class="timer-caption">дней</div>
              </div>

              <div class="timer-cell">
                <div class="timer-number" id="hours">14</div>
                <div class="timer-caption">часов</div>
              </div>

              <div class="timer-cell">
                <div class="timer-number" id="minutes">23</div>
                <div class="timer-caption">минут</div>
              </div>

              <div class="timer-cell">
                <div class="timer-number" id="seconds">47</div>
                <div class="timer-caption">секунд</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const nameFromUrl = params.get("displayName") || params.get("firstname") || params.get("name");
    if (nameFromUrl) document.getElementById("userName").textContent = decodeURIComponent(nameFromUrl);

    const accessFromUrl = params.get("access_until");
    let accessUntil = accessFromUrl ? new Date(accessFromUrl) : null;
    if (!accessUntil || Number.isNaN(accessUntil.getTime())) {
      accessUntil = new Date();
      accessUntil.setDate(accessUntil.getDate() + 9);
      accessUntil.setHours(accessUntil.getHours() + 14);
      accessUntil.setMinutes(accessUntil.getMinutes() + 23);
      accessUntil.setSeconds(accessUntil.getSeconds() + 47);
    }

    const elDays = document.getElementById("days");
    const elHours = document.getElementById("hours");
    const elMinutes = document.getElementById("minutes");
    const elSeconds = document.getElementById("seconds");
    const pad = (value) => String(value).padStart(2, "0");

    function zeroTimer() {
      elDays.textContent = "00";
      elHours.textContent = "00";
      elMinutes.textContent = "00";
      elSeconds.textContent = "00";
    }

    function updateTimer() {
      const diff = accessUntil.getTime() - Date.now();
      if (diff <= 0) return zeroTimer();
      elDays.textContent = pad(Math.floor(diff / 86400000));
      elHours.textContent = pad(Math.floor(diff / 3600000) % 24);
      elMinutes.textContent = pad(Math.floor(diff / 60000) % 60);
      elSeconds.textContent = pad(Math.floor(diff / 1000) % 60);
    }

    updateTimer();
    window.setInterval(updateTimer, 1000);

    const glass = document.getElementById("glassTimer");
    const canHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
    if (glass && canHover) {
      window.addEventListener("mousemove", (event) => {
        const x = (event.clientX / window.innerWidth - .5) * 5;
        const y = (event.clientY / window.innerHeight - .5) * 5;
        glass.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      });
    }
  </script>
</body>
</html>
