<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оплата...</title>

<script>
window.onload = function () {

    // небольшая задержка, чтобы пользователь увидел,
    // что платеж завершился

    setTimeout(function(){

        window.location.href="guidepage.html";

    },1200);

};
</script>

<style>
html,body{
margin:0;
height:100%;
background:#121212;
display:flex;
align-items:center;
justify-content:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:white;
}

.loader{
text-align:center;
}

.spinner{
width:60px;
height:60px;
border:4px solid rgba(255,255,255,.15);
border-top:4px solid #d9b15f;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto auto 25px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

h2{
font-weight:500;
margin:0;
letter-spacing:1px;
}

p{
opacity:.7;
margin-top:12px;
}
</style>

</head>

<body>

<div class="loader">

<div class="spinner"></div>

<h2>Оплата подтверждена</h2>

<p>Открываем Ваш гид...</p>

</div>

</body>
</html>
