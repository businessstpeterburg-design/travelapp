<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Доступ открыт</title>

  <style>
    :root {
      --bg: #050505;
      --bg-soft: #0b0b0b;
      --white: #f5f5f7;
      --muted: rgba(245, 245, 247, 0.52);
      --muted-soft: rgba(245, 245, 247, 0.28);
      --gold: #d9b15f;
      --gold-light: #f1d79b;
      --tiffany: #39d2c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 100dvh;
      padding: 24px;

      overflow: hidden;

      color: var(--white);

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        "Segoe UI",
        sans-serif;

      background:
        radial-gradient(
          circle at 50% -12%,
          rgba(57, 210, 192, 0.085) 0%,
          rgba(57, 210, 192, 0.024) 28%,
          transparent 54%
        ),
        radial-gradient(
          circle at 50% 112%,
          rgba(217, 177, 95, 0.10) 0%,
          rgba(217, 177, 95, 0.028) 30%,
          transparent 57%
        ),
        linear-gradient(
          180deg,
          #0d0d0d 0%,
          #070707 46%,
          #030303 100%
        );

      opacity: 1;
      transition:
        opacity 0.7s cubic-bezier(.22, 1, .36, 1),
        transform 0.7s cubic-bezier(.22, 1, .36, 1),
        filter 0.7s ease;
    }

    body::before {
      content: "";

      position: fixed;
      inset: -30%;

      background:
        conic-gradient(
          from 190deg at 50% 50%,
          transparent 0deg,
          rgba(255, 255, 255, 0.018) 72deg,
          transparent 138deg,
          rgba(57, 210, 192, 0.015) 222deg,
          transparent 292deg
        );

      filter: blur(80px);
      animation: atmosphere 18s linear infinite;

      pointer-events: none;
    }

    body::after {
      content: "";

      position: fixed;
      inset: 0;

      background:
        linear-gradient(
          110deg,
          transparent 25%,
          rgba(255, 255, 255, 0.018) 48%,
          transparent 70%
        );

      transform: translateX(-130%);
      animation: lightSweep 5.2s ease-in-out infinite;

      pointer-events: none;
    }

    body.is-leaving {
      opacity: 0;
      transform: scale(1.018);
      filter: blur(6px);
    }

    .scene {
      position: relative;
      z-index: 2;

      width: 100%;
      max-width: 430px;

      text-align: center;
    }

    .portal {
      position: relative;

      width: 142px;
      height: 142px;

      margin: 0 auto 42px;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portal-glow {
      position: absolute;
      inset: 15px;

      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(217, 177, 95, 0.19) 0%,
          rgba(57, 210, 192, 0.075) 36%,
          transparent 73%
        );

      filter: blur(20px);
      opacity: 0;

      animation:
        glowReveal 1.1s 0.7s cubic-bezier(.22, 1, .36, 1) forwards,
        glowBreath 2.8s 1.8s ease-in-out infinite;
    }

    .door {
      position: absolute;
      top: 50%;
      left: 50%;

      width: 2px;
      height: 96px;

      border-radius: 999px;

      transform: translate(-50%, -50%);
      transform-origin: center;

      background:
        linear-gradient(
          180deg,
          transparent 0%,
          rgba(241, 215, 155, 0.38) 12%,
          var(--gold-light) 44%,
          var(--gold) 72%,
          transparent 100%
        );

      box-shadow:
        0 0 10px rgba(217, 177, 95, 0.34),
        0 0 28px rgba(217, 177, 95, 0.15);

      animation: lineReveal 0.9s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .door-left,
    .door-right {
      position: absolute;
      top: 50%;

      width: 1px;
      height: 96px;

      border-radius: 999px;

      background:
        linear-gradient(
          180deg,
          transparent 0%,
          rgba(241, 215, 155, 0.22) 16%,
          rgba(217, 177, 95, 0.92) 50%,
          rgba(57, 210, 192, 0.38) 84%,
          transparent 100%
        );

      opacity: 0;

      box-shadow:
        0 0 12px rgba(217, 177, 95, 0.22);

      animation: doorsOpen 1.2s 0.72s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .door-left {
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .door-right {
      right: 50%;
      transform: translate(50%, -50%);
    }

    .portal-core {
      position: absolute;

      width: 54px;
      height: 54px;

      border-radius: 50%;

      opacity: 0;
      transform: scale(0.72);

      background:
        radial-gradient(
          circle at 50% 38%,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(241, 215, 155, 0.88) 12%,
          rgba(217, 177, 95, 0.23) 39%,
          rgba(57, 210, 192, 0.07) 63%,
          transparent 75%
        );

      filter: blur(0.3px);

      animation:
        coreReveal 0.9s 1.16s cubic-bezier(.22, 1, .36, 1) forwards,
        corePulse 2.5s 2.1s ease-in-out infinite;
    }

    .portal-ring {
      position: absolute;

      width: 112px;
      height: 112px;

      border-radius: 50%;

      opacity: 0;
      transform: scale(0.84);

      border: 1px solid rgba(217, 177, 95, 0.21);

      box-shadow:
        inset 0 0 20px rgba(217, 177, 95, 0.025),
        0 0 24px rgba(57, 210, 192, 0.03);

      animation: ringReveal 1s 1.04s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .status {
      opacity: 0;
      transform: translateY(10px);

      margin-bottom: 15px;

      font-size: 11px;
      line-height: 1;
      font-weight: 600;

      letter-spacing: 3px;
      text-transform: uppercase;

      color: rgba(245, 245, 247, 0.34);

      animation: textReveal 0.8s 1.22s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .title {
      opacity: 0;
      transform: translateY(14px);

      margin-bottom: 17px;

      font-size: clamp(34px, 9vw, 47px);
      line-height: 1.02;
      font-weight: 600;

      letter-spacing: -1.7px;

      color: #ffffff;

      animation: textReveal 0.9s 1.42s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .description {
      opacity: 0;
      transform: translateY(12px);

      max-width: 310px;
      margin: 0 auto;

      font-size: 16px;
      line-height: 1.58;
      font-weight: 400;

      letter-spacing: -0.1px;

      color: var(--muted);

      animation: textReveal 0.9s 1.66s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .progress {
      position: relative;

      width: 120px;
      height: 2px;

      margin: 35px auto 0;

      overflow: hidden;
      border-radius: 999px;

      opacity: 0;

      background: rgba(255, 255, 255, 0.06);

      animation: fadeOnly 0.7s 1.95s ease forwards;
    }

    .progress::before {
      content: "";

      position: absolute;
      top: 0;
      left: -52%;

      width: 52%;
      height: 100%;

      border-radius: inherit;

      background:
        linear-gradient(
          90deg,
          transparent,
          var(--tiffany),
          var(--gold-light),
          transparent
        );

      filter: drop-shadow(0 0 6px rgba(217, 177, 95, 0.35));

      animation: progressMove 1.55s 2.05s ease-in-out infinite;
    }

    .note {
      opacity: 0;
      transform: translateY(8px);

      margin-top: 18px;

      font-size: 12px;
      line-height: 1.5;
      font-weight: 400;

      color: var(--muted-soft);

      animation: textReveal 0.8s 2.1s ease forwards;
    }

    @keyframes lineReveal {
      from {
        opacity: 0;
        height: 0;
      }

      to {
        opacity: 1;
        height: 96px;
      }
    }

    @keyframes doorsOpen {
      0% {
        opacity: 0;
      }

      18% {
        opacity: 1;
      }

      100% {
        opacity: 0.78;
      }
    }

    @keyframes doorsOpen {
      0% {
        opacity: 0;
      }

      18% {
        opacity: 1;
      }

      100% {
        opacity: 0.75;
      }
    }

    .door-left {
      animation-name: doorLeftOpen;
    }

    .door-right {
      animation-name: doorRightOpen;
    }

    @keyframes doorLeftOpen {
      0% {
        left: 50%;
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        left: 30%;
        opacity: 0.78;
      }
    }

    @keyframes doorRightOpen {
      0% {
        right: 50%;
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        right: 30%;
        opacity: 0.78;
      }
    }

    @keyframes glowReveal {
      from {
        opacity: 0;
        transform: scale(0.78);
      }

      to {
        opacity: 0.9;
        transform: scale(1);
      }
    }

    @keyframes glowBreath {
      0%,
      100% {
        opacity: 0.58;
        transform: scale(0.96);
      }

      50% {
        opacity: 0.95;
        transform: scale(1.07);
      }
    }

    @keyframes coreReveal {
      from {
        opacity: 0;
        transform: scale(0.72);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes corePulse {
      0%,
      100% {
        transform: scale(0.96);
        opacity: 0.78;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    @keyframes ringReveal {
      from {
        opacity: 0;
        transform: scale(0.84);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes textReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOnly {
      to {
        opacity: 1;
      }
    }

    @keyframes progressMove {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(330%);
      }
    }

    @keyframes atmosphere {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes lightSweep {
      0%,
      100% {
        transform: translateX(-130%);
      }

      48%,
      56% {
        transform: translateX(130%);
      }
    }

    @media (max-width: 420px) {
      .portal {
        width: 128px;
        height: 128px;
        margin-bottom: 37px;
      }

      .portal-ring {
        width: 102px;
        height: 102px;
      }

      .title {
        font-size: 37px;
      }

      .description {
        max-width: 285px;
        font-size: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <main class="scene">

    <div class="portal" aria-hidden="true">
      <div class="portal-glow"></div>
      <div class="door"></div>
      <div class="door-left"></div>
      <div class="door-right"></div>
      <div class="portal-ring"></div>
      <div class="portal-core"></div>
    </div>

    <div class="status">
      Доступ активирован
    </div>

    <h1 class="title">
      Добро пожаловать
    </h1>

    <p class="description">
      Открываем Ваш персональный гид
    </p>

    <div class="progress" aria-hidden="true"></div>

    <p class="note">
      Это займёт несколько секунд
    </p>

  </main>

  <script>
    window.addEventListener("load", function () {
      const query = window.location.search || "";

      setTimeout(function () {
        document.body.classList.add("is-leaving");

        setTimeout(function () {
          window.location.replace(
            "https://businessstpeterburg-design.github.io/travelapp/guidepage.html" +
            query
          );
        }, 700);
      }, 3900);
    });
  </script>

</body>
</html>
